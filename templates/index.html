<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ac AI Agent</title>
  <style>
    /* ── CSS custom properties (easy to retheme) ──────────────── */
    :root {
      --bg:           #f0f2f5;
      --header-bg:    #1a1a2e;
      --header-text:  #ffffff;
      --user-bubble:  #4f46e5;
      --user-text:    #ffffff;
      --claude-bubble:#ffffff;
      --claude-text:  #1f2937;
      --tool-border:  #f59e0b;
      --tool-bg:      #fffbeb;
      --tool-text:    #78350f;
      --input-bg:     #ffffff;
      --send-bg:      #4f46e5;
      --send-text:    #ffffff;
      --error-bg:     #fee2e2;
      --error-text:   #991b1b;
      --muted:        #6b7280;
      --radius:       14px;
    }

    /* ── Reset & base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont,
      'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--claude-text); }

    /* ── App shell (full-height flex column) ───────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      box-shadow: 0 0 40px rgba(0,0,0,.12);
    }

    /* ── Header ────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: var(--header-bg);
      color: var(--header-text);
      flex-shrink: 0;
    }
    header h1 { font-size: 1.05rem; font-weight: 600; letter-spacing: .3px; }
    header span { font-size: .75rem; opacity: .55; margin-left: 8px; }

    #btn-reset {
      background: rgba(255,255,255,.12);
      color: var(--header-text);
      border: 1px solid rgba(255,255,255,.2);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: .8rem;
      cursor: pointer;
      transition: background .15s;
    }
    #btn-reset:hover { background: rgba(255,255,255,.22); }

    /* ── Chat window ───────────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--bg);
    }

    /* ── Generic bubble ────────────────────────────────────────── */
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: var(--radius);
      line-height: 1.55;
      word-break: break-word;
      font-size: .925rem;
    }

    /* ── User bubble (right) ───────────────────────────────────── */
    .bubble.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    /* ── Claude bubble (left) ──────────────────────────────────── */
    .bubble.claude {
      align-self: flex-start;
      background: var(--claude-bubble);
      color: var(--claude-text);
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }
    /* Markdown rendering inside Claude bubbles */
    .bubble.claude p  { margin-bottom: .5em; }
    .bubble.claude p:last-child { margin-bottom: 0; }
    .bubble.claude code {
      background: #f3f4f6;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: .875em;
    }
    .bubble.claude pre {
      background: #f3f4f6;
      padding: 10px 12px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: .82rem;
      margin: 6px 0;
    }
    .bubble.claude strong { font-weight: 600; }
    .bubble.claude em     { font-style: italic; }

    /* ── Error bubble ──────────────────────────────────────────── */
    .bubble.error {
      align-self: flex-start;
      background: var(--error-bg);
      color: var(--error-text);
      border: 1px solid #fca5a5;
      border-bottom-left-radius: 4px;
      font-size: .88rem;
    }

    /* ── Tool-call block (<details>) ───────────────────────────── */
    .tool-block {
      align-self: flex-start;
      max-width: 82%;
      background: var(--tool-bg);
      border: 1px solid #fde68a;
      border-left: 4px solid var(--tool-border);
      border-radius: 8px;
      font-size: .83rem;
      overflow: hidden;
    }
    .tool-block summary {
      padding: 7px 12px;
      cursor: pointer;
      color: var(--tool-text);
      font-weight: 600;
      user-select: none;
      list-style: none;  /* hide default triangle in Firefox */
    }
    .tool-block summary::-webkit-details-marker { display: none; }
    .tool-block summary:hover { background: #fef3c7; }
    .tool-block .tool-body {
      padding: 8px 12px 10px;
      border-top: 1px solid #fde68a;
    }
    .tool-block .label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
      margin: 6px 0 3px;
    }
    .tool-block pre {
      background: #fff8e7;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 6px 8px;
      overflow-x: auto;
      font-size: .8rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .truncated-note {
      font-size: .72rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 4px;
    }

    /* ── Thinking indicator ────────────────────────────────────── */
    .thinking {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 10px 16px;
      background: var(--claude-bubble);
      border: 1px solid #e5e7eb;
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
    }
    .thinking span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: .15s; }
    .thinking span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ─────────────────────────────────────────────── */
    #input-bar {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      padding: 12px 16px;
      background: var(--input-bg);
      border-top: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    #msg {
      flex: 1;
      resize: none;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: .93rem;
      font-family: inherit;
      line-height: 1.5;
      max-height: 140px;
      outline: none;
      transition: border-color .15s;
    }
    #msg:focus { border-color: var(--user-bubble); }
    #msg:disabled { background: #f9fafb; color: var(--muted); }

    #btn-send {
      background: var(--send-bg);
      color: var(--send-text);
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: .93rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    #btn-send:hover   { opacity: .88; }
    #btn-send:disabled { opacity: .4; cursor: default; }

    /* ── History counter ───────────────────────────────────────── */
    #history-count {
      font-size: .72rem;
      color: var(--muted);
      text-align: center;
      padding: 2px 0 6px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div>
      <h1>ac AI Agent</h1>
      <span id="history-label">no history yet</span>
    </div>
    <button id="btn-reset" onclick="resetChat()">New Chat</button>
  </header>

  <!-- Chat window -->
  <div id="chat"></div>

  <!-- Input bar -->
  <div id="input-bar">
    <textarea id="msg" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"></textarea>
    <button id="btn-send" onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
  const chat    = document.getElementById('chat');
  const msgBox  = document.getElementById('msg');
  const btnSend = document.getElementById('btn-send');
  const histLabel = document.getElementById('history-label');

  // ── Simple Markdown → HTML (no external library) ─────────────
  function renderMarkdown(text) {
    return text
      // Fenced code blocks ```...```
      .replace(/```([\s\S]*?)```/g, (_, c) =>
        `<pre><code>${escHtml(c.trim())}</code></pre>`)
      // Inline code `...`
      .replace(/`([^`]+)`/g, (_, c) =>
        `<code>${escHtml(c)}</code>`)
      // Bold **...**
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic *...*
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Newlines → <br> (but not inside already-replaced blocks)
      .replace(/\n/g, '<br>');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
              .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Append a chat bubble ──────────────────────────────────────
  function addBubble(role, html) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    div.innerHTML = html;
    chat.appendChild(div);
    return div;
  }

  // ── Append a tool-call <details> block ───────────────────────
  function addToolBlock(step) {
    // Build a short label from the most relevant input field
    const inputVals = Object.values(step.tool_input);
    const shortVal  = inputVals.length
      ? String(inputVals[0]).slice(0, 50)
      : '';
    const summary   = `🔧 ${step.tool_name}` + (shortVal ? ` — "${shortVal}"` : '');

    const details = document.createElement('details');
    details.className = 'tool-block';
    details.innerHTML = `
      <summary>${escHtml(summary)}</summary>
      <div class="tool-body">
        <div class="label">Input</div>
        <pre>${escHtml(JSON.stringify(step.tool_input, null, 2))}</pre>
        <div class="label">Result</div>
        <pre>${escHtml(step.tool_result)}</pre>
        ${step.tool_result_truncated
          ? '<p class="truncated-note">… result truncated for display</p>'
          : ''}
      </div>`;
    chat.appendChild(details);
  }

  // ── Show / remove the Thinking... indicator ───────────────────
  function addThinking() {
    const div = document.createElement('div');
    div.className = 'thinking';
    div.id = 'thinking';
    div.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(div);
    scrollToBottom();
    return div;
  }
  function removeThinking() {
    document.getElementById('thinking')?.remove();
  }

  // ── Scroll chat to the bottom ─────────────────────────────────
  function scrollToBottom() {
    chat.scrollTop = chat.scrollHeight;
  }

  // ── Auto-resize textarea ──────────────────────────────────────
  msgBox.addEventListener('input', () => {
    msgBox.style.height = 'auto';
    msgBox.style.height = Math.min(msgBox.scrollHeight, 140) + 'px';
  });

  // ── Send on Enter, newline on Shift+Enter ─────────────────────
  msgBox.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Main send function ────────────────────────────────────────
  async function sendMessage() {
    const text = msgBox.value.trim();
    if (!text) return;

    // 1. Show user bubble
    addBubble('user', escHtml(text).replace(/\n/g, '<br>'));

    // 2. Clear input & show Thinking...
    msgBox.value = '';
    msgBox.style.height = 'auto';
    setInputEnabled(false);
    addThinking();
    scrollToBottom();

    try {
      // 3. Call the Flask backend
      const res  = await fetch('/chat', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ message: text }),
      });
      const data = await res.json();

      removeThinking();

      // 4. Render tool-call blocks
      (data.steps || []).forEach(addToolBlock);

      // 5. Render Claude's reply or an error
      if (data.error) {
        addBubble('error', `⚠️ ${escHtml(data.error)}`);
      } else {
        addBubble('claude', renderMarkdown(data.response || '(no response)'));
      }

      // 6. Update history counter
      if (data.history_length != null) {
        histLabel.textContent = `${data.history_length} messages in history`;
      }

    } catch (err) {
      removeThinking();
      addBubble('error', `⚠️ Network error: ${escHtml(String(err))}`);
    }

    setInputEnabled(true);
    scrollToBottom();
    msgBox.focus();
  }

  // ── New Chat button ───────────────────────────────────────────
  async function resetChat() {
    await fetch('/reset', { method: 'POST' });
    chat.innerHTML = '';
    histLabel.textContent = 'no history yet';
    addBubble('claude', 'Conversation cleared. Start fresh! 👋');
    msgBox.focus();
  }

  // ── Enable / disable input while agent is running ────────────
  function setInputEnabled(enabled) {
    msgBox.disabled  = !enabled;
    btnSend.disabled = !enabled;
  }

  // ── Welcome message on page load ─────────────────────────────
  window.addEventListener('load', () => {
    addBubble('claude', renderMarkdown(
      `👋 **Hi! I'm ac AI Agent.** Here's what I can do:\n\n` +
      `🔍 **Web Search** — Find up-to-date information from the web\n` +
      `🌤️ **Weather** — Get live weather for any city in the world\n` +
      `📂 **Read Files** — Read files from the local \`files/\` folder\n` +
      `💾 **Write Files** — Save notes, summaries, or any text to a file\n` +
      `🧮 **Calculator** — Evaluate math expressions\n\n` +
      `I also **remember our conversation** — so you can build on previous answers.\n\n` +
      `Try asking: *"What's the weather in Tokyo?"* or *"What is 123 * 456?"*`
    ));
    msgBox.focus();
  });
</script>
</body>
</html>
